name: CI (Snapshot Build)

on:
  push:
    branches: [ main ]
    tags-ignore: [ '*' ]
    paths-ignore:
      - '.github/**'
      - '.gitattributes'
      - '.gitignore'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ARTIFACTS_REPO_USER: ${{ secrets.ARTIFACTS_REPO_USER }}
      ARTIFACTS_REPO_TOKEN: ${{ secrets.ARTIFACTS_REPO_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build and test (with Build Scan)
        run: ./gradlew --no-daemon clean build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
          if-no-files-found: warn

  publish-pages:
    needs: build-and-test
    runs-on: ubuntu-latest

    if: >
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && github.ref == 'refs/heads/main'
      && needs.build-and-test.result == 'success'

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Generate Javadocs
        run: ./gradlew --no-daemon javadoc

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages site
        run: |
          rm -rf _site
          mkdir -p _site/test-report _site/javadocs

          # Write polished index.html
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>Build Reports</title>
          <link rel="stylesheet" href="./style.css">

          <header class="page-header">
            <h1>Build Reports</h1>
            <p class="subtitle">CI artefacts generated from <strong>main</strong></p>
          </header>

          <main class="container">

          <section>
            <h2>Test Reports</h2>
            <ul class="card-grid">
          HTML

          find . -type d -path '*/build/reports/tests/test' -print0 |
          while IFS= read -r -d '' report_dir; do
            module="${report_dir#./}"
            module="${module%%/build/reports/tests/test}"
            mkdir -p "_site/test-report/$module"
            cp -R "$report_dir/." "_site/test-report/$module" || true

            cat >> _site/index.html <<HTML
              <li class="card">
                <a href="./test-report/$module/">
                  <span class="card-title">$module</span>
                  <span class="card-meta">JUnit test report</span>
                </a>
              </li>
          HTML
          done

          cat >> _site/index.html <<'HTML'
            </ul>
          </section>

          <section>
            <h2>Javadocs</h2>
            <ul class="card-grid">
          HTML

          find . -type d -path '*/build/docs/javadoc' -print0 |
          while IFS= read -r -d '' doc_dir; do
            module="${doc_dir#./}"
            module="${module%%/build/docs/javadoc}"
            mkdir -p "_site/javadocs/$module"
            cp -R "$doc_dir/." "_site/javadocs/$module" || true

            cat >> _site/index.html <<HTML
              <li class="card">
                <a href="./javadocs/$module/">
                  <span class="card-title">$module</span>
                  <span class="card-meta">Public API documentation</span>
                </a>
              </li>
          HTML
          done

          cat >> _site/index.html <<'HTML'
            </ul>
          </section>
          </main>

          <footer>
            <p>Generated by GitHub Actions · <time id="ts"></time></p>
          </footer>

          <script>
            document.getElementById("ts").textContent =
              new Date().toISOString().replace("T", " ").replace("Z", " UTC");
          </script>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4