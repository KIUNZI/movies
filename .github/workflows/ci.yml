name: CI (Snapshot Build)

on:
  push:
    branches:
      - main
    tags-ignore:
      - '*'
    paths-ignore:
      - '.github/**'
      - '.gitattributes'
      - '.gitignore'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ARTIFACTS_REPO_USER: ${{ secrets.ARTIFACTS_REPO_USER }}
      ARTIFACTS_REPO_TOKEN: ${{ secrets.ARTIFACTS_REPO_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build and test (with Build Scan)
        run: ./gradlew --no-daemon clean build --scan -Dscan.termsOfServiceUrl=https://gradle.com/terms-of-service -Dscan.termsOfServiceAgree=yes

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
          if-no-files-found: warn

      - name: Configure GitHub Pages
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Prepare Pages site
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        run: |
          rm -rf _site
          mkdir -p _site/test-report

          cat > _site/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>Build reports</title>
          <h1>Build reports</h1>
          <ul>
          HTML

          report_count=0
          while IFS= read -r -d '' report_dir; do
            module_path="${report_dir#./}"
            module_name="${module_path%%/build/reports/tests/test}"
            target_dir="_site/test-report/${module_name}"

            mkdir -p "${target_dir}"
            cp -R "${report_dir}/." "${target_dir}" || true

            printf '  <li><a href="./test-report/%s/">%s</a></li>\n' "${module_name}" "${module_name}" >> _site/index.html
            report_count=$((report_count + 1))
          done < <(find . -type d -path '*/build/reports/tests/test' -print0)

          if [ "${report_count}" -eq 0 ]; then
            echo '  <li>No Gradle HTML test reports were found.</li>' >> _site/index.html
          fi

          echo '</ul>' >> _site/index.html

      - name: Upload Pages artifact
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy-pages:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.build-and-test.result == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4