name: CI (Release Tag Build)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ci-movies-release-tags
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ARTIFACTS_REPO_USER: ${{ secrets.ARTIFACTS_REPO_USER }}
      ARTIFACTS_REPO_TOKEN: ${{ secrets.ARTIFACTS_REPO_TOKEN }}
      QUARKUS_CONTAINER_IMAGE_PASSWORD: ${{ secrets.REGISTRY_TOKEN }}
      QUARKUS_CONTAINER_IMAGE_USERNAME: jasonmarstoncouk
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Validate tag format
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            echo "Invalid release tag: $TAG"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build, test, and push container image
        run: ./gradlew --no-daemon clean build -Dquarkus.container-image.build=true -Dquarkus.container-image.push=true

      - name: Generate Javadocs
        run: ./gradlew --no-daemon javadoc

      - name: Publish artifacts
        run: ./gradlew --no-daemon publish


      - name: Upload reports and docs for Pages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-and-docs
          path: |
            **/build/reports/tests/test/**
            **/build/docs/javadoc/**
          if-no-files-found: warn


